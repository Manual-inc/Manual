<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Manual execution map</title>
  <desc id="desc">A workflow graph showing agents wrapped by sandbox policies and producing run artifacts.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#161616" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#222"/>
    </marker>
  </defs>
  <rect width="1120" height="520" fill="#f7f7f2"/>
  <path d="M0 116 H1120 M0 260 H1120 M0 404 H1120 M160 0 V520 M420 0 V520 M700 0 V520 M960 0 V520" stroke="#deded2" stroke-width="1"/>
  <rect x="70" y="70" width="980" height="380" rx="8" fill="#fff" stroke="#161616" stroke-width="2" filter="url(#shadow)"/>
  <text x="104" y="122" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="29" font-weight="700" fill="#161616">Manual execution model</text>
  <text x="104" y="158" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="16" fill="#4e4e45">Agent plus sandbox becomes an executable node. Nodes plus edges become a workflow.</text>
  <g font-family="Avenir Next, Helvetica, Arial, sans-serif">
    <rect x="114" y="238" width="170" height="96" rx="8" fill="#dff3ea" stroke="#147d64" stroke-width="2"/>
    <text x="142" y="277" font-size="18" font-weight="700" fill="#0d5544">Input</text>
    <text x="142" y="306" font-size="13" fill="#204d43">ticket, event, file</text>
    <rect x="378" y="214" width="190" height="144" rx="8" fill="#fff6d7" stroke="#bd7a00" stroke-width="2"/>
    <text x="412" y="255" font-size="18" font-weight="700" fill="#714800">Agent</text>
    <text x="412" y="284" font-size="13" fill="#604818">Codex, script, model</text>
    <rect x="400" y="300" width="146" height="36" rx="6" fill="#161616"/>
    <text x="427" y="323" font-size="13" font-weight="700" fill="#fff">sandbox policy</text>
    <rect x="660" y="214" width="190" height="144" rx="8" fill="#e8edff" stroke="#4056a1" stroke-width="2"/>
    <text x="694" y="255" font-size="18" font-weight="700" fill="#26366e">Workflow</text>
    <text x="694" y="284" font-size="13" fill="#394470">branch, loop, join</text>
    <rect x="920" y="238" width="150" height="96" rx="8" fill="#ffe7df" stroke="#c24b2c" stroke-width="2"/>
    <text x="953" y="277" font-size="18" font-weight="700" fill="#7c2d1a">Artifacts</text>
    <text x="953" y="306" font-size="13" fill="#6c372a">report, patch, cost</text>
    <path d="M284 286 H366" stroke="#222" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M568 286 H648" stroke="#222" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M850 286 H908" stroke="#222" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
</svg>
