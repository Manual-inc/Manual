name: CI
# Why this exists: docs/wiki/architecture/cli-release-distribution.md explains the
# release smoke checks that keep the curl|bash installer aligned with shipped archives.

on:
  push:
    branches: [main, "feat/**", "fix/**", "codex/**"]
  pull_request:

jobs:
  # ── Rust: manual-rs 워크스페이스 (Ubuntu / macOS / Windows) ──────────────
  rust-workspace:
    name: "Rust workspace (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: manual-rs
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable 설치
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: manual-rs

      - name: Install bubblewrap (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y bubblewrap
          # Ubuntu 23.10+ AppArmor restricts unprivileged user-namespace creation
          # (needed by bwrap).  Disable the restriction for CI.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: 빌드
        run: cargo build --workspace

      - name: 테스트
        run: cargo test --workspace

  # ── Rust: CLI (Ubuntu / macOS / Windows) ────────────────────────────────
  cli:
    name: "CLI (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: app/cli
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable 설치
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/cli

      - name: 빌드
        run: cargo build --release

      - name: 테스트
        if: runner.os != 'Windows'
        run: cargo test

  # ── Release packaging / install smoke (Linux / macOS) ─────────────────────
  release-smoke:
    name: "Release smoke (${{ matrix.platform }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-13
            platform: darwin-x86_64
          - os: macos-14
            platform: darwin-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Rust stable 설치
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 빌드 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            app/cli
            manual-rs

      - name: install.sh 도움말 검사
        run: bash install.sh --help

      - name: 릴리스 아카이브 패키징
        run: bash scripts/package-release.sh "${{ matrix.platform }}" dist

      - name: 설치 스모크 테스트
        run: bash scripts/test-install-smoke.sh "${{ matrix.platform }}" "dist/manual-${{ matrix.platform }}.tar.gz"

  # ── macOS 앱 (Swift Package) ─────────────────────────────────────────────
  mac-app:
    name: "Mac App (Swift, macos-15)"
    runs-on: macos-15
    defaults:
      run:
        working-directory: app/mac
    steps:
      - uses: actions/checkout@v4

      - name: Swift 버전 확인
        run: swift --version

      - name: 빌드
        run: swift build

  # ── Windows 앱 (WinUI 3 / .NET 10) ──────────────────────────────────────
  windows-app:
    name: "Windows App (WinUI 3)"
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app/window
    steps:
      - uses: actions/checkout@v4

      - name: .NET 10 SDK 설치
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: 빌드
        run: dotnet build --configuration Release
