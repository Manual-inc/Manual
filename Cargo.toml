[workspace]
members = [
    "crates/core",
    "crates/app",
    "crates/cli",
    "crates/skill",
    "crates/agent",
    "crates/graph-viewer",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
manual_core = { package = "manual-core", path = "crates/core" }
cli = { path = "crates/cli" }
