name: Sandbox Enforcement

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/sandbox/**"
      - ".github/workflows/sandbox-enforcement.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/sandbox/**"
      - ".github/workflows/sandbox-enforcement.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  strict-sandbox:
    name: Strict sandbox (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux sandbox backend
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          bwrap --version

      - name: Verify macOS sandbox backend
        if: runner.os == 'macOS'
        run: |
          test -x /usr/bin/sandbox-exec
          /usr/bin/sandbox-exec -p '(version 1) (allow default)' /bin/echo sandbox-exec-ready

      - name: Verify Windows strict backend expectation
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Windows runner executes sandbox policy and fallback tests."
          Write-Host "Strict Windows enforcement remains gated until the restricted-token backend is implemented."

      - name: Run strict sandbox tests
        if: runner.os == 'macOS'
        env:
          MANUAL_SANDBOX_STRICT: "1"
        run: cargo test -p sandbox

      - name: Run strict sandbox tests
        if: runner.os == 'Linux'
        env:
          MANUAL_SANDBOX_STRICT: "1"
        run: |
          CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
          RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}"
          sudo env \
            "PATH=$PATH" \
            "CARGO_HOME=$CARGO_HOME" \
            "RUSTUP_HOME=$RUSTUP_HOME" \
            "CARGO_TERM_COLOR=$CARGO_TERM_COLOR" \
            "MANUAL_SANDBOX_STRICT=$MANUAL_SANDBOX_STRICT" \
            cargo test -p sandbox

      - name: Run Windows sandbox tests
        if: runner.os == 'Windows'
        run: cargo test -p sandbox
